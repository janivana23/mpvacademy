<!DOCTYPE html>
<html>
<head>
<title>MPV Academy</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

.hero {
    background: linear-gradient(120deg,#ff7a00,#6a0dad);
    color:white;
    text-align:center;
    padding:80px 20px;
}

section { padding:40px; max-width:900px; margin:auto; }

.card {
    background:white;
    padding:20px;
    margin:10px 0;
    border-radius:10px;
}

input, select {
    width:100%;
    padding:10px;
    margin:8px 0;
}

button {
    width:100%;
    padding:12px;
    background:#6a0dad;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="hero">
<h1>MPV Academy 🚀</h1>
<p>Real EdTech Learning Platform</p>
</div>

<section>

<h2>Book Free Trial</h2>

<form id="leadForm">

<input id="name" placeholder="Name" required>

<select id="level">
<option>Primary</option>
<option>Secondary</option>
<option>Exam Prep</option>
<option>University</option>
</select>

<select id="subject">
<option>Math</option>
<option>English</option>
<option>Science</option>
<option>IT</option>
</select>

<input id="phone" placeholder="Phone" required>

<button type="submit">Submit</button>

</form>

</section>

<script>

const URL = "PASTE_YOUR_SCRIPT_URL";

document.getElementById("leadForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const data = {
    action: "lead",
    name: name.value,
    level: level.value,
    subject: subject.value,
    phone: phone.value
  };

  const res = await fetch(URL,{
    method:"POST",
    body: JSON.stringify(data)
  });

  const result = await res.json();

  window.location.href = result.whatsapp;
});

</script>

</body>
</html>
