<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body style="font-family:Arial;background:#f5f5f5">

<h2 style="text-align:center">MPV Dashboard 🎓</h2>

<div id="lessons"></div>

<script>

const URL = "YOUR_SCRIPT_URL";

fetch(URL,{
  method:"POST",
  body:JSON.stringify({action:"lessons"})
})
.then(r=>r.json())
.then(data=>{
  document.getElementById("lessons").innerHTML =
    data.map(l=>`
      <div style="background:white;margin:10px;padding:15px;border-radius:10px">
        <h3>${l[2]}</h3>
        <p>${l[3]}</p>
        <button onclick="complete('${l[0]}')">Complete</button>
      </div>
    `).join("");
});

function complete(id){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"progress",
      user_id:localStorage.getItem("user_id"),
      lesson_id:id,
      status:"done"
    })
  });

  alert("Saved!");
}

</script>

</body>
</html>
