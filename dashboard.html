<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body>

<h2>MPV LMS 🎓</h2>

<div id="lessons"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwWsIr9b0WZWvCaa73cbmQuwT3EnSz9Whalz2vYmYGsw69s9wISI6IpDOwxk2dwaevEzg/exec";

fetch(URL,{
  method:"POST",
  body:JSON.stringify({action:"lessons"})
})
.then(r=>r.json())
.then(data=>{
  document.getElementById("lessons").innerHTML =
    data.map(l=>`
      <div style="background:#eee;padding:15px;margin:10px">
        <h3>${l[1]}</h3>
        <p>${l[2]}</p>
        <button onclick="done('${l[0]}')">Complete</button>
      </div>
    `).join("");
});

function done(id){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"progress",
      user_id:localStorage.getItem("user_id"),
      lesson_id:id,
      status:"done"
    })
  });

  alert("Saved!");
}

</script>

</body>
</html>
