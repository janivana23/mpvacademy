<!DOCTYPE html>
<html>
<head>
<title>Login - MPV Academy</title>

<style>
body { font-family:Arial; background:#f5f5f5; }

.card {
  max-width:400px;
  margin:100px auto;
  background:white;
  padding:25px;
  border-radius:12px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
}

button {
  width:100%;
  padding:12px;
  background:#6a0dad;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="card">

<h2>Student Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyF9JhjAzZWWf-wnKJlOGVY2no-XybDyAhRgv2i1zuQLbvahqkTAqOn8vcUzVRDGaZZcw/exec";

function login(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      email:email.value,
      password:password.value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="ok"){
      localStorage.setItem("user_id", res.user_id);
      window.location.href="dashboard.html";
    } else {
      alert("Invalid login");
    }
  });
}

</script>

</body>
</html>
