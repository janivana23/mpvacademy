<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body>

<h2>MPV Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwWsIr9b0WZWvCaa73cbmQuwT3EnSz9Whalz2vYmYGsw69s9wISI6IpDOwxk2dwaevEzg/exec";

function login(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      email:email.value,
      password:password.value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="ok"){
      localStorage.setItem("user_id", res.user_id);
      window.location.href="dashboard.html";
    } else {
      alert("Invalid login");
    }
  });
}

</script>

</body>
</html>
