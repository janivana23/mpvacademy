<!DOCTYPE html>
<html>
<head>
<title>MPV Academy - Apply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:Arial; background:#f5f5f5; }

.box {
  max-width:450px;
  margin:70px auto;
  background:white;
  padding:25px;
  border-radius:12px;
}

input, select {
  width:100%;
  padding:12px;
  margin:8px 0;
  box-sizing:border-box;
}

.subjects label {
  display:block;
  margin:5px 0;
}

button {
  width:100%;
  padding:12px;
  background:#6a0dad;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="box">

<h2>Book Free Trial 🚀</h2>

<form id="form">

<input id="parent" placeholder="Parent Name" required>
<input id="student" placeholder="Student Name" required>
<input id="phone" placeholder="Phone Number" required>

<select id="level">
  <option>Primary</option>
  <option>Secondary</option>
  <option>O Level</option>
  <option>A Level</option>
  <option>Pre-University</option>
  <option>Other</option>
</select>

<h4>Subjects:</h4>

<div class="subjects">
  <label><input type="checkbox" value="Math"> Math</label>
  <label><input type="checkbox" value="English"> English</label>
  <label><input type="checkbox" value="Science"> Science</label>
  <label><input type="checkbox" value="Physics"> Physics</label>
  <label><input type="checkbox" value="Chemistry"> Chemistry</label>
  <label><input type="checkbox" value="IT"> IT</label>
</div>

<select id="plan">
  <option>Starter</option>
  <option>Achiever</option>
  <option>Champion</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxeuq5rv4QYnMlyqgJ1mkoz2oeGdAx6KeH56_pCNhyBMBm2tdlwHApUdqQL9j4ejeWj3g/exec";

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  // collect multiple subjects properly
  const subjects = Array.from(
    document.querySelectorAll('input[type="checkbox"]:checked')
  ).map(x => x.value).join(", ");

  const payload = {
    action: "lead",
    parent_name: document.getElementById("parent").value,
    student_name: document.getElementById("student").value,
    phone: document.getElementById("phone").value,
    level: document.getElementById("level").value,
    subject: subjects,
    plan: document.getElementById("plan").value
  };

  try {
    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const result = await res.json();

    if (result.whatsapp) {
      window.location.href = result.whatsapp;
    } else {
      alert("Submitted successfully!");
    }

  } catch (err) {
    alert("Error submitting form");
    console.log(err);
  }
});

</script>

</body>
</html>
