<!DOCTYPE html>
<html>
<head>
<title>Apply - MPV Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:Arial; background:#f5f5f5; margin:0; }

.box {
  max-width:420px;
  margin:80px auto;
  background:white;
  padding:25px;
  border-radius:12px;
}

input, select {
  width:100%;
  padding:12px;
  margin:8px 0;
}

button {
  width:100%;
  padding:12px;
  background:#6a0dad;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="box">

<h2>Book Free Trial 🚀</h2>

<form id="form">

<input id="name" placeholder="Name" required>

<select id="level">
<option>Primary</option>
<option>Secondary</option>
<option>Exam Prep</option>
<option>University</option>
</select>

<select id="subject">
<option>Math</option>
<option>English</option>
<option>Science</option>
<option>IT</option>
</select>

<input id="phone" placeholder="WhatsApp Number" required>

<button type="submit">Submit</button>

</form>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyF9JhjAzZWWf-wnKJlOGVY2no-XybDyAhRgv2i1zuQLbvahqkTAqOn8vcUzVRDGaZZcw/exec";

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const data = {
    action:"lead",
    name:name.value,
    level:level.value,
    subject:subject.value,
    phone:phone.value
  };

  const res = await fetch(URL,{
    method:"POST",
    body:JSON.stringify(data)
  });

  const result = await res.json();

  window.location.href = result.whatsapp;
});

</script>

</body>
</html>
