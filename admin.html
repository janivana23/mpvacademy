<!DOCTYPE html>
<html>
<head>
<title>Admin - MPV Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:Arial; background:#f5f5f5; margin:0; }

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
}

button {
  padding:10px;
  background:#ff7a00;
  border:none;
  color:white;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Dashboard 📊</h2>

<button onclick="load()">Load Data</button>

<pre id="out"></pre>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwU28mzdD3ekUBfpjIRi26ecGaKLp9VVjPCMQYFn10_qaPbOmospSkLSYmaJ9oHvmFbDQ/exec";

function load(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({action:"getLessons"})
  })
  .then(r=>r.json())
  .then(d=>{
    out.innerText = JSON.stringify(d,null,2);
  });
}
</script>

</body>
</html>
